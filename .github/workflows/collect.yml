name: Collect World News

on:
  schedule:
    - cron: '*/15 * * * *'    # 每15分钟
  workflow_dispatch:            # 手动触发

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: collect-pip-${{ hashFiles('pipeline/gh_requirements.txt') }}
          restore-keys: collect-pip-

      - name: Install dependencies
        run: pip install -r pipeline/gh_requirements.txt

      - name: Run collector
        run: python pipeline/gh_collector.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pipeline/data/latest_news.json
          git diff --cached --quiet || (git commit -m "[bot] 采集更新 $(TZ='Asia/Shanghai' date '+%m-%d %H:%M')" && git push)
